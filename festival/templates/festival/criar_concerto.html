{% extends 'festival/layout.html' %}

{% block content %}
<article class="card">
    <h2>Criar novo concerto</h2>

    <form method="post" style="display: grid; gap: 12px; max-width: 520px;">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Criar concerto</button>
    </form>
</article>
{% endblock %}
